<svg width="100%" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Accident Command Center">
  <defs>
    <radialGradient id="emberCoreM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="55%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </radialGradient>
    <linearGradient id="reticleEdgeM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#1F2937" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="emberGlowM" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(120,120)">
    <circle r="106" fill="none" stroke="url(#reticleEdgeM)" stroke-width="0.7" opacity="0.55"/>
    <circle r="92" fill="none" stroke="#1F2937" stroke-width="0.5" opacity="0.3"/>
    <g stroke="#1F2937" stroke-width="0.8" opacity="0.55">
      <line x1="0" y1="-110" x2="0" y2="-96"/>
      <line x1="0" y1="96" x2="0" y2="110"/>
      <line x1="-110" y1="0" x2="-96" y2="0"/>
      <line x1="96" y1="0" x2="110" y2="0"/>
    </g>
    <g fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-82" opacity="0.95"/>
      <line x1="0" y1="0" x2="56" y2="-62" opacity="0.85"/>
      <line x1="0" y1="0" x2="80" y2="-18" opacity="0.9"/>
      <line x1="0" y1="0" x2="68" y2="42" opacity="0.7"/>
      <line x1="0" y1="0" x2="30" y2="74" opacity="0.55"/>
      <line x1="0" y1="0" x2="-40" y2="64" opacity="0.6"/>
      <line x1="0" y1="0" x2="-76" y2="28" opacity="0.85"/>
      <line x1="0" y1="0" x2="-62" y2="-50" opacity="0.78"/>
      <line x1="0" y1="0" x2="-22" y2="-78" opacity="0.65"/>
    </g>
    <g fill="none" stroke="#475569" stroke-width="0.7" stroke-linecap="round" opacity="0.5">
      <line x1="0" y1="0" x2="42" y2="-74"/>
      <line x1="0" y1="0" x2="86" y2="12"/>
      <line x1="0" y1="0" x2="12" y2="86"/>
      <line x1="0" y1="0" x2="-86" y2="-4"/>
    </g>
    <g fill="#EF4444" opacity="0.85">
      <circle cx="54" cy="-50" r="2.1"/>
      <circle cx="-68" cy="20" r="1.6"/>
      <circle cx="38" cy="58" r="1.2"/>
      <circle cx="-28" cy="-72" r="1.4"/>
      <circle cx="74" cy="6" r="0.95"/>
    </g>
    <circle r="20" fill="#FFFFFF"/>
    <circle r="13" fill="url(#emberCoreM)" filter="url(#emberGlowM)"/>
    <circle r="5.5" fill="#FCA5A5"/>
    <circle r="2.2" fill="#FFFFFF"/>
    <circle r="20" fill="none" stroke="#EF4444" stroke-width="0.85" opacity="0.7">
      <animate attributeName="r" from="16" to="32" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
