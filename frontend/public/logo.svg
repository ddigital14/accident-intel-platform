    <polygon points="0,-122 105.7,-61 105.7,61 0,122 -105.7,61 -105.7,-61" fill="none" stroke="#10B981" stroke-width="0.4" opacity="0.25"/>
    <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50" fill="url(#hexFill)"/>
    <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50" fill="none" stroke="url(#hexEdge)" stroke-width="1.2"/>
    <polygon points="0,-88 76.2,-44 76.2,44 0,88 -76.2,44 -76.2,-44" fill="none" stroke="#10B981" stroke-width="0.35" opacity="0.45"/>
    <line x1="-40" y1="-78" x2="-72" y2="-78" stroke="#10B981" stroke-width="0.4" opacity="0.4"/>
    <line x1="40" y1="-78" x2="72" y2="-78" stroke="#10B981" stroke-width="0.4" opacity="0.4"/>
    <line x1="-40" y1="78" x2="-72" y2="78" stroke="#10B981" stroke-width="0.4" opacity="0.4"/>
    <line x1="40" y1="78" x2="72" y2="78" stroke="#10B981" stroke-width="0.4" opacity="0.4"/>
    <text x="0" y="2" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="56" font-weight="500" fill="url(#textInner)" letter-spacing="2">A<tspan fill="#10B981">C</tspan>C</text>
    <line x1="-40" y1="22" x2="40" y2="22" stroke="#10B981" stroke-width="0.5" opacity="0.7"/>
    <text x="0" y="42" text-anchor="middle" font-size="9" fill="#94A3B8" letter-spacing="3.4">COMMAND ACTIVE</text>
    <g transform="translate(0,-100)">
      <circle r="10" fill="#FAFAF9"/>
      <circle r="6.5" fill="#DC2626"/>
