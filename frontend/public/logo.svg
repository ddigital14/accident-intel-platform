    <text x="0" y="34" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="30" font-weight="500" fill="#1F2937" letter-spacing="4.2">COMMAND<tspan fill="#10B981" letter-spacing="4.2"> &#183; </tspan>CENTER</text>
  </g>
  <g transform="translate(340,400)">
