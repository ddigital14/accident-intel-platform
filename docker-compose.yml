version: '3.8'

services:
  # ============================================
  # PostgreSQL Database with PostGIS
  # ============================================
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: accident_intel
      POSTGRES_USER: aip_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./database/seeds/001_metro_areas.sql:/docker-entrypoint-initdb.d/002_seeds.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip_user -d accident_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (Job Queue & Cache)
  # ============================================
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Main API Server + Ingestion
  # ============================================
  api:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aip_user:${DB_PASSWORD:-changeme_in_production}@db:5432/accident_intel
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    volumes:
      - ./logs:/app/logs

  # ============================================
  # Background Worker (skip tracing, geocoding, notifications)
  # ============================================
  worker:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "src/ingestion/worker.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aip_user:${DB_PASSWORD:-changeme_in_production}@db:5432/accident_intel
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
  redisdata:
