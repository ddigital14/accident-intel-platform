<!DOCTYPE html>
<html>
<head>
<style>
body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; background: #151d32; color: #f4f7ff; }
h2 { margin: 0 0 8px; font-size: 16px; }
p { font-size: 12px; color: #a0b0d0; line-height: 1.5; }
a { color: #4f6bff; text-decoration: none; }
.status { margin-top: 12px; padding: 8px; background: #0d1424; border-radius: 6px; font-size: 11px; }
</style>
</head>
<body>
<h2>AIP Lead Claimer</h2>
<p>Adds a one-click <strong>Claim</strong> button to every lead in your AIP dashboard.</p>
<p>To use:<br>1. Log in to <a href="https://accident-intel-platform.vercel.app" target="_blank">accident-intel-platform.vercel.app</a><br>2. Click the ⚡ Claim button on any lead</p>
<div class="status" id="status">Status: ready</div>
<script>
chrome.tabs.query({active: true, currentWindow: true}, (tabs) => {
  const url = tabs[0]?.url || '';
  const el = document.getElementById('status');
  if (url.includes('accident-intel-platform')) el.textContent = 'Status: active on this tab';
  else el.textContent = 'Status: inactive — open AIP first';
});
</script>
</body>
</html>
